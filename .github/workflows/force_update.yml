name: Force Update (Re-scrape + Re-summarize)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '目标日期 (YYYYMMDD)，默认当天'
        required: false
        default: ''
        type: string

jobs:
  force-update:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine target date
      id: date
      run: |
        INPUT="${{ github.event.inputs.target_date }}"
        if [ -z "$INPUT" ]; then
          TARGET=$(date -u +"%Y%m%d")
        else
          TARGET="$INPUT"
        fi
        echo "target=$TARGET" >> $GITHUB_OUTPUT
        # 判断是否是今天
        TODAY=$(date -u +"%Y%m%d")
        if [ "$TARGET" = "$TODAY" ]; then
          echo "is_today=true" >> $GITHUB_OUTPUT
        else
          echo "is_today=false" >> $GITHUB_OUTPUT
        fi
        # 转换为 YYYY-MM-DD 格式
        DASH_DATE="${TARGET:0:4}-${TARGET:4:2}-${TARGET:6:2}"
        echo "dash_date=$DASH_DATE" >> $GITHUB_OUTPUT
        echo "📅 目标日期: $DASH_DATE (is_today=$( [ "$TARGET" = "$TODAY" ] && echo true || echo false ))"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ "${{ steps.date.outputs.is_today }}" = "true" ]; then
          playwright install --with-deps chromium
        fi

    - name: Run Scraper (仅当天)
      if: steps.date.outputs.is_today == 'true'
      run: python scrape_fanqie_ranks.py
      env:
        GITHUB_ACTIONS: true

    - name: Build Latest Data with AI Summary (Force)
      run: pip install openai && python scripts/build_latest.py --force --date ${{ steps.date.outputs.dash_date }}
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        API_KEY: ${{ secrets.API_KEY }}
        API_MODEL: ${{ secrets.API_MODEL }}

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "[Force] Re-summarize Fanqie ranks (${{ steps.date.outputs.dash_date }})"
        file_pattern: data/*
        branch: main

    # ---- Deploy to GitHub Pages ----
    - name: Setup Pages
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
